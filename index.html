<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trem de Minas - Finalizar Pedido</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    
    body {
      background-image: repeating-linear-gradient(90deg, #f1c40f20, #f1c40f20 15px, #ffffff 15px, #ffffff 30px);
      color: #3b2f2f;
    }

    header {
      background: #58181a;
      color: #fdf5e6;
      text-align: center;
      padding: 40px 20px;
      border-bottom: 5px solid #d35400;
    }

    .container { max-width: 600px; margin: auto; padding: 40px 20px; }

    .formulario {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 2px solid #58181a;
    }

    h2 { color: #58181a; margin-bottom: 20px; text-align: center; }

    label { display: block; margin-top: 15px; font-weight: bold; color: #58181a; }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    /* Estilo para o Total */
    .caixa-total {
      background: #fdf5e6;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: center;
      border: 2px dashed #d35400;
    }

    .valor-total {
      font-size: 1.8rem;
      font-weight: bold;
      color: #58181a;
    }

    .btn-enviar {
      background-color: #25d366;
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-enviar:hover { background-color: #128c7e; transform: scale(1.02); }
  </style>
</head>
<body>

<header>
  <h1>🧀 Trem de Minas</h1>
  <p>Peça agora e receba em casa</p>
</header>

<div class="container">
  <div class="formulario">
    <h2>Dados do Pedido</h2>
    
    <form id="pedidoForm">
      <label for="produto">O que você vai querer?</label>
      <select id="produto" onchange="calcularTotal()" required>
        <option value="0">Selecione um produto...</option>
        <option value="40">Queijo Artesanal - R$ 40,00</option>
        <option value="25">Doce de Leite (Corte) - R$ 25,00</option>
        <option value="25">Doce de Leite com Coco - R$ 25,00</option>
        <option value="25">Geleia de Mocotó - R$ 25,00</option>
        <option value="25">Geleia de Amendoim - R$ 25,00</option>
      </select>

      <label for="quantidade">Quantidade:</label>
      <input type="number" id="quantidade" value="1" min="1" oninput="calcularTotal()" required>

      <div class="caixa-total">
        <p>Total do Pedido:</p>
        <span class="valor-total" id="displayTotal">R$ 0,00</span>
      </div>

      <label for="nome">Seu Nome:</label>
      <input type="text" id="nome" placeholder="Como te chamamos?" required>

      <label for="endereco">Endereço de Entrega:</label>
      <textarea id="endereco" rows="3" placeholder="Rua, número, bairro..." required></textarea>

      <label for="pagamento">Forma de Pagamento:</label>
      <select id="pagamento" required>
        <option value="Pix">Pix</option>
        <option value="Cartão">Cartão (Levamos a maquininha)</option>
        <option value="Dinheiro">Dinheiro</option>
      </select>

      <button type="button" class="btn-enviar" onclick="enviarWhatsApp()">🚀 Enviar Pedido via WhatsApp</button>
    </form>
  </div>
</div>

<script>
  // Função para calcular o valor automaticamente
  function calcularTotal() {
    const preco = parseFloat(document.getElementById('produto').value);
    const qtd = parseInt(document.getElementById('quantidade').value);
    const total = preco * qtd;
    
    document.getElementById('displayTotal').innerText = R$ ${total.toFixed(2).replace('.', ',')};
  }

  function enviarWhatsApp() {
    const telefone = "5561999152151"; 
    
    const selectProduto = document.getElementById('produto');
    const nomeProduto = selectProduto.options[selectProduto.selectedIndex].text;
    const valorUnitario = selectProduto.value;
    const qtd = document.getElementById('quantidade').value;
    const nome = document.getElementById('nome').value;
    const endereco = document.getElementById('endereco').value;
    const pagamento = document.getElementById('pagamento').value;
    const totalFinal = document.getElementById('displayTotal').innerText;

    if(valorUnitario == "0" || !nome || !endereco) {
      alert("Por favor, preencha todos os campos!");
      return;
    }

    const mensagem = *NOVO PEDIDO - TREM DE MINAS*%0A +
                     ----------------------------------%0A +
                     *Produto:* ${nomeProduto}%0A +
                     *Quantidade:* ${qtd}%0A +
                     *TOTAL:* ${totalFinal}%0A +
                     ----------------------------------%0A +
                     *Cliente:* ${nome}%0A +
                     *Endereço:* ${endereco}%0A +
                     *Pagamento:* ${pagamento}%0A +
                     ----------------------------------%0A +
                     _Enviado pelo site_;

    window.open(https://wa.me/${telefone}?text=${mensagem}, '_blank');
  }
</script>

</body>
</html>
